<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>SentinelIQ | AI Incident Station</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3b82f6; }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 2; height: 100%; z-index: 1; }
        #sidebar { flex: 1; background: #1e293b; padding: 20px; overflow-y: auto; border-left: 1px solid #334155; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }
        .status-box { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; color: #3b82f6; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0; font-size: 22px;">SentinelIQ <span style="font-weight:lighter; font-size:14px; color:#94a3b8;">| Applied AI</span></h1>
    <button class="btn" onclick="syncNews()">Sync Live News</button>
</div>

<div id="main-container">
    <div id="map"></div>
    <div id="sidebar">
        <div class="status-box">
            <h2>AI Neural Search</h2>
            <input type="text" id="queryInput" placeholder="Ask about Lephalale incidents...">
            <button class="btn" style="width:100%; margin-top:15px;" onclick="queryAI()">Query Intelligence</button>
        </div>
        <div id="results" class="status-box">
            <h2>System Logs</h2>
            <p id="status-text" style="color:#94a3b8;">Ready for synchronization...</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
