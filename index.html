<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>SentinelIQ | AI Incident Station</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #1e293b; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3b82f6; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        #main-container { display: flex; flex: 1; overflow: hidden; }
        #map { flex: 2; height: 100%; z-index: 1; border-right: 1px solid #334155; }
        #sidebar { flex: 1; background: #1e293b; padding: 20px; overflow-y: auto; }
        .btn { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; width: auto; }
        .btn:hover { background: #2563eb; transform: translateY(-1px); }
        .status-box { background: #0f172a; padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; color: #3b82f6; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        #status-text { font-family: 'Courier New', monospace; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="header">
    <h1 style="margin:0; font-size: 22px;">SentinelIQ <span style="font-weight:lighter; font-size:14px; color:#94a3b8;">| Applied AI</span></h1>
    <button class="btn" onclick="syncNews()">Sync Live News</button>
</div>

<div id="main-container">
    <div id="map"></div>
    <div id="sidebar">
        <div class="status-box">
            <h2>AI Neural Search</h2>
            <input type="text" id="queryInput" placeholder="Ask about Lephalale incidents...">
            <button class="btn" style="width:100%; margin-top:15px;" onclick="queryAI()">Query Intelligence</button>
        </div>
        <div id="results" class="status-box">
            <h2>System Logs</h2>
            <p id="status-text" style="color:#10b981;">> System Standby...</p>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // MATCHES YOUR WORKING URL FROM SCREENSHOT (186)
    const RENDER_URL = "https://sentinel-iq.onrender.com";

    const map = L.map('map').setView([-23.666, 27.733], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function syncNews() {
        const status = document.getElementById('status-text');
        status.innerText = "> Connecting to AI Engine...";
        try {
            const response = await fetch(`${RENDER_URL}/ingest`);
            const data = await response.json();
            
            // FIX FOR UNDEFINED: This looks for any successful message key
            const msg = data.message || data.status || "Sync Complete";
            alert("SUCCESS: AI Brain is Synchronized!");
            status.innerHTML = `<span style="color:#10b981;">> SUCCESS: ${msg}</span>`;
        } catch (error) {
            alert("Sync Blocked! Click the Lock Icon 🔒 in the address bar and 'Allow Insecure Content'.");
            status.innerHTML = `<span style="color:#ef4444;">> ERROR: Connection Blocked by Browser</span>`;
        }
    }

    async function queryAI() {
        const query = document.getElementById('queryInput').value;
        if (!query) return alert("Enter a question first!");
        
        const status = document.getElementById('status-text');
        status.innerText = "> AI is processing intelligence...";
        
        try {
            const response = await fetch(`${RENDER_URL}/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query: query })
            });
            const data = await response.json();
            
            // FIX FOR UNDEFINED: Handles 'answer', 'response', or 'message'
            const finalAnswer = data.answer || data.response || data.message || "No specific data returned.";
            
            document.getElementById('results').innerHTML = `<h2>AI Intelligence</h2><p>${finalAnswer}</p>`;
            status.innerHTML = `<span style="color:#10b981;">> Query Successful</span>`;
        } catch (error) {
            alert("Query failed. Is the server awake?");
            status.innerHTML = `<span style="color:#ef4444;">> ERROR: Neural Link Timeout</span>`;
        }
    }
</script>

</body>
</html>
