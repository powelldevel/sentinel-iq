<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>SentinelIQ | AI Incident Station</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #3b82f6; margin-bottom: 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
    </style>
</head>
<body>
    <h1>SentinelIQ Dashboard</h1>
    <div class="box">
        <button onclick="sync()">1. Sync Live News</button>
        <p id="sync-status">Status: Waiting...</p>
    </div>
    <div class="box">
        <h2>2. Ask AI</h2>
        <input type="text" id="userInput" placeholder="Ask about Lephalale news...">
        <button onclick="ask()">Query Intelligence</button>
        <div id="ai-output" style="margin-top:20px; color: #10b981; font-weight: bold;"></div>
    </div>

    <script>
        const API_URL = "https://sentinel-iq.onrender.com";

        async function sync() {
            document.getElementById('sync-status').innerText = "Syncing...";
            try {
                const r = await fetch(`${API_URL}/ingest_news`, { method: 'POST' });
                const d = await r.json();
                document.getElementById('sync-status').innerText = "ONLINE: " + (d.message || "Success");
            } catch (e) { document.getElementById('sync-status').innerText = "Error: Wake up server!"; }
        }

        async function ask() {
            const val = document.getElementById('userInput').value;
            const out = document.getElementById('ai-output');
            out.innerText = "AI is thinking...";
            try {
                const r = await fetch(`${API_URL}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: val }) // SENDS 'text'
                });
                const d = await r.json();
                // READS 'result'
                out.innerText = d.result || d.detail[0].msg || JSON.stringify(d);
            } catch (e) { out.innerText = "Connection failed."; }
        }
    </script>
</body>
</html>
